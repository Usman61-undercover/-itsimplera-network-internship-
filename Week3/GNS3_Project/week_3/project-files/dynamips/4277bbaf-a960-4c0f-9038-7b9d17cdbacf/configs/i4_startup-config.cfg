!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R4
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
!
!
ip tcp synwait-time 5
!
!
!
!
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
!
interface FastEthernet0/0
 description Link to R3
 ip address 192.168.10.74 255.255.255.252
 duplex auto
 speed auto
!
interface FastEthernet0/1
 description Link to R5
 ip address 192.168.10.77 255.255.255.252
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet1/0
 description Link to R6 (RIP domain)
 ip address 192.168.10.85 255.255.255.252
 duplex auto
 speed auto
!
router rip
 version 2
 network 4.0.0.0
 network 192.168.10.0
 no auto-summary
!
ip forward-protocol nd
ip route 192.168.10.48 255.255.255.240 192.168.10.86 130
!
!
no ip http server
no ip http secure-server
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
