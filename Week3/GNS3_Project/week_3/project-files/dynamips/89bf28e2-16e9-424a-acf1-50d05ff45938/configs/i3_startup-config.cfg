!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R3
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
!
!
ip tcp synwait-time 5
!
!
!
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
!
interface FastEthernet0/0
 description Link to R2 (Area 0)
 ip address 192.168.10.70 255.255.255.252
 duplex auto
 speed auto
!
interface FastEthernet0/1
 description Link to R4 (RIP domain boundary)
 ip address 192.168.10.73 255.255.255.252
 duplex auto
 speed auto
!
interface FastEthernet1/0
 description LAN3 -> Switch2 (PC3, PC4)
 ip address 192.168.10.17 255.255.255.240
 duplex auto
 speed auto
!
router ospf 1
 router-id 3.3.3.3
 log-adjacency-changes
 redistribute rip metric 20 metric-type 1 subnets
 network 3.3.3.3 0.0.0.0 area 0
 network 192.168.10.16 0.0.0.15 area 0
 network 192.168.10.68 0.0.0.3 area 0
!
router rip
 version 2
 redistribute ospf 1 metric 3
 network 192.168.10.0
 no auto-summary
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
